<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&amp;display=swap');
      .text-mocha {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 52px;
        fill: #f4ebd9;
        letter-spacing: -2px;
      }
      .text-ds {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 32px;
        fill: #1b1b22;
        letter-spacing: -1px;
      }
    </style>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c2d35" />
      <stop offset="100%" stop-color="#141419" />
    </linearGradient>

    <linearGradient id="grad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f8e5ff" />
      <stop offset="100%" stop-color="#b493f3" />
    </linearGradient>

    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c1b4d" />
      <stop offset="100%" stop-color="#825bb5" />
    </linearGradient>

    <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9368d1" />
      <stop offset="100%" stop-color="#7bd5e8" />
    </linearGradient>

    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7bd5e8" />
      <stop offset="100%" stop-color="#348ab4" />
    </linearGradient>

    <filter id="m-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.45" />
    </filter>
    
    <filter id="box-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Icon -->
  <rect x="75" y="30" width="150" height="150" rx="36" fill="url(#bgGrad)" filter="url(#box-shadow)" />

  <!-- M Shape Layers -->
  <g stroke-width="24" stroke-linecap="round">
    <!-- Back Layer: Left Diagonal -->
    <path d="M 110 75 L 150 115" stroke="url(#grad2)" filter="url(#m-shadow)" />
    
    <!-- Middle Layer: Left Leg -->
    <path d="M 110 135 L 110 75" stroke="url(#grad1)" filter="url(#m-shadow)" />
    
    <!-- Front Layer: Right Ribbon (Diagonal + Leg) -->
    <g filter="url(#m-shadow)">
      <path d="M 190 135 L 190 75" stroke="url(#grad4)" />
      <path d="M 150 115 L 190 75" stroke="url(#grad3)" />
    </g>
  </g>

  <!-- Text Lockup -->
  <text x="20" y="245" class="text-mocha" text-anchor="start">mocha</text>

  <rect x="200" y="196" width="76" height="56" rx="20" fill="#8bd3e6" />
  <text x="238" y="238" class="text-ds" text-anchor="middle">DS</text>
</svg>
